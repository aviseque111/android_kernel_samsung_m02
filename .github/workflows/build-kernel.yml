name: Build KernelSU Kernel for SM-M022G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
    
    - name: Install essential build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git make gcc g++ flex bison bc \
          libssl-dev libelf-dev device-tree-compiler \
          cpio kmod lzop xz-utils curl \
          libncurses-dev lib32ncurses-dev libc6-dev-i386 \
          python3
    
    - name: Setup toolchain (matching build script expectations)
      run: |
        cd $GITHUB_WORKSPACE
        
        # Create the exact directory structure the build script expects
        mkdir -p toolchain/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin
        
        # Download the correct toolchain
        cd toolchain/gcc/linux-x86/arm/arm-linux-androideabi-4.9
        curl -L https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-18.1.tar.gz | tar xz --strip-components=1
        
        # Verify toolchain
        cd $GITHUB_WORKSPACE
        ls -la toolchain/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin/
    
    - name: Enable KernelSU in defconfig
      run: |
        cd $GITHUB_WORKSPACE
        
        echo "=== Adding KernelSU to a02_defconfig ==="
        
        if [ -f arch/arm/configs/a02_defconfig ]; then
          # Add KernelSU config
          echo "CONFIG_KSU=y" >> arch/arm/configs/a02_defconfig
          echo "✅ KernelSU enabled in a02_defconfig"
        else
          echo "❌ a02_defconfig not found!"
          ls arch/arm/configs/ | grep a02
          exit 1
        fi
    
    - name: Build kernel using original build script method
      run: |
        cd $GITHUB_WORKSPACE
        
        echo "=== Building with a02_defconfig ==="
        
        export CROSS_COMPILE=$(pwd)/toolchain/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin/arm-linux-androidkernel-
        export ARCH=arm
        export KCFLAGS=-w
        export CONFIG_SECTION_MISMATCH_WARN_ONLY=y
        
        echo "Toolchain: $CROSS_COMPILE"
        ls -la $(dirname $CROSS_COMPILE)
        
        echo "=== Running make defconfig ==="
        make -C $(pwd) O=$(pwd)/out KCFLAGS=-w CONFIG_SECTION_MISMATCH_WARN_ONLY=y a02_defconfig
        
        echo "=== Running make ==="
        make -C $(pwd) O=$(pwd)/out KCFLAGS=-w CONFIG_SECTION_MISMATCH_WARN_ONLY=y -j$(nproc)
    
    - name: Package kernel
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p release
        
        echo "=== Checking output directory ==="
        ls -la out/arch/arm/boot/
        
        # The build script copies Image, but we need zImage for flashing
        if [ -f out/arch/arm/boot/Image ]; then
          cp out/arch/arm/boot/Image release/
          echo "✅ Found Image"
        fi
        
        if [ -f out/arch/arm/boot/zImage ]; then
          cp out/arch/arm/boot/zImage release/
          echo "✅ Found zImage"
        fi
        
        if [ -f out/arch/arm/boot/zImage-dtb ]; then
          cp out/arch/arm/boot/zImage-dtb release/
          echo "✅ Found zImage-dtb"
        fi
        
        # Create flash instructions
        cat > release/README.txt << 'INFO'
        SM-M022G KernelSU Kernel
        ========================
        
        Flash with ErosFlashTool:
        1. Load scatter file
        2. Replace boot partition with zImage/Image
        3. Download
        
        Or with dd:
        su -c "dd if=Image of=/dev/block/platform/bootdevice/by-name/boot"
        INFO
        
        echo "=== Release contents ==="
        ls -la release/
    
    - name: Upload kernel artifact
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-SM-M022G
        path: release/
        retention-days: 7
