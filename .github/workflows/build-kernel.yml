name: Build KernelSU Kernel for SM-M022G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 30
    
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
    
    - name: Install essential build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git make gcc g++ flex bison bc \
          libssl-dev libelf-dev device-tree-compiler \
          cpio kmod lzop xz-utils curl \
          libncurses-dev lib32ncurses-dev libc6-dev-i386 \
          python3
    
    - name: Setup toolchain
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p toolchain/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin
        cd toolchain/gcc/linux-x86/arm/arm-linux-androideabi-4.9
        curl -L https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-18.1.tar.gz | tar xz --strip-components=1
    
    - name: Enable KernelSU and prepare defconfig
      run: |
        cd $GITHUB_WORKSPACE
        
        # Add KernelSU to a02_defconfig
        if [ -f arch/arm/configs/a02_defconfig ]; then
          echo "CONFIG_KSU=y" >> arch/arm/configs/a02_defconfig
          echo "✅ KernelSU enabled in a02_defconfig"
        fi
        
        # Also add to k39tv1 defconfig as fallback
        if [ -f arch/arm/configs/k39tv1_bsp_titan_hamster_defconfig ]; then
          echo "CONFIG_KSU=y" >> arch/arm/configs/k39tv1_bsp_titan_hamster_defconfig
        fi
    
    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE
        
        export CROSS_COMPILE=$(pwd)/toolchain/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin/arm-linux-androidkernel-
        export ARCH=arm
        export KCFLAGS=-w
        export CONFIG_SECTION_MISMATCH_WARN_ONLY=y
        
        echo "=== Making defconfig ==="
        make -C $(pwd) O=$(pwd)/out ARCH=arm a02_defconfig
        
        echo "=== Updating config (non-interactive) ==="
        make -C $(pwd) O=$(pwd)/out ARCH=arm olddefconfig
        
        echo "=== Starting compilation ==="
        make -C $(pwd) O=$(pwd)/out ARCH=arm -j4 LOCALVERSION="-KernelSU"
    
    - name: Package kernel
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p release
        
        echo "=== Looking for kernel images ==="
        ls -la out/arch/arm/boot/
        
        if [ -f out/arch/arm/boot/Image ]; then
          cp out/arch/arm/boot/Image release/
          echo "✅ Copied Image"
        fi
        if [ -f out/arch/arm/boot/zImage ]; then
          cp out/arch/arm/boot/zImage release/
          echo "✅ Copied zImage"
        fi
        if [ -f out/arch/arm/boot/zImage-dtb ]; then
          cp out/arch/arm/boot/zImage-dtb release/
          echo "✅ Copied zImage-dtb"
        fi
        
        echo "=== Release contents ==="
        ls -la release/
    
    - name: Upload kernel artifact
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-SM-M022G
        path: release/
        retention-days: 7
