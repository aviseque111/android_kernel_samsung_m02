name: Build KernelSU Kernel for SM-M022G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git make gcc g++ flex bison bc \
          libssl-dev libelf-dev device-tree-compiler \
          cpio kmod lzop xz-utils curl \
          libncurses-dev gcc-arm-linux-gnueabihf
    
    - name: Build kernel (all in one step)
      run: |
        cd $GITHUB_WORKSPACE
        
        export ARCH=arm
        export CROSS_COMPILE=arm-linux-gnueabihf-
        
        echo "=== Copying a02_defconfig to .config ==="
        cp arch/arm/configs/a02_defconfig .config
        
        echo "=== Adding KernelSU and Kprobes ==="
        echo "CONFIG_KSU=y" >> .config
        echo "CONFIG_KPROBES=y" >> .config
        echo "CONFIG_HAVE_KPROBES=y" >> .config
        echo "CONFIG_KPROBE_EVENTS=y" >> .config
        
        echo "=== Running silentoldconfig ==="
        make ARCH=arm silentoldconfig < /dev/null || true
        
        echo "=== .config file status ==="
        ls -la .config
        head -20 .config
        
        echo "=== Starting compilation ==="
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- -j4 LOCALVERSION="-KernelSU"
    
    - name: Package kernel
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p release
        cp arch/arm/boot/zImage* release/ 2>/dev/null || cp arch/arm/boot/Image release/ 2>/dev/null
        ls -la release/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-SM-M022G
        path: release/
        retention-days: 7
