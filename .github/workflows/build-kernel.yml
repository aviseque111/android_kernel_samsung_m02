name: Build KernelSU Kernel for SM-M022G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 30
    
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git make gcc g++ flex bison bc \
          libssl-dev libelf-dev device-tree-compiler \
          cpio kmod lzop xz-utils curl \
          libncurses-dev gcc-arm-linux-gnueabihf
    
    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE
        
        export ARCH=arm
        export CROSS_COMPILE=arm-linux-gnueabihf-
        
        echo "=== Copying defconfig to .config ==="
        cp arch/arm/configs/a02_defconfig .config
        
        echo "=== Adding KernelSU ==="
        echo "CONFIG_KSU=y" >> .config
        
        echo "=== Running oldconfig (auto-answer yes) ==="
        yes "" | make ARCH=arm oldconfig
        
        echo "=== Starting compilation ==="
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- -j4 LOCALVERSION="-KernelSU"
    
    - name: Package kernel
      run: |
        mkdir -p release
        cp arch/arm/boot/zImage* release/ 2>/dev/null || cp arch/arm/boot/Image release/ 2>/dev/null
        ls -la release/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-SM-M022G
        path: release/
        retention-days: 7
