name: Build KernelSU Kernel for SM-M022G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
    
    - name: Install essential build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git make gcc g++ flex bison bc \
          libssl-dev libelf-dev device-tree-compiler \
          cpio kmod lzop xz-utils curl \
          libncurses-dev lib32ncurses-dev libc6-dev-i386 \
          python3
    
    - name: Setup toolchain
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p toolchain/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin
        cd toolchain/gcc/linux-x86/arm/arm-linux-androideabi-4.9
        curl -L https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-18.1.tar.gz | tar xz --strip-components=1
    
    - name: List available defconfigs
      run: |
        cd $GITHUB_WORKSPACE
        echo "=== Available defconfigs ==="
        ls arch/arm/configs/ | grep -E "k39|titan|hamster|a02|M02" || ls arch/arm/configs/ | head -20
    
    - name: Enable KernelSU and prepare defconfig
      run: |
        cd $GITHUB_WORKSPACE
        
        # Use the defconfig we know exists
        DEFCONFIG="k39tv1_bsp_titan_hamster_defconfig"
        
        if [ -f "arch/arm/configs/$DEFCONFIG" ]; then
          echo "✅ Found $DEFCONFIG"
          echo "CONFIG_KSU=y" >> arch/arm/configs/$DEFCONFIG
          echo "✅ KernelSU enabled in $DEFCONFIG"
        else
          echo "❌ $DEFCONFIG not found!"
          echo "Trying fallback..."
          FALLBACK=$(ls arch/arm/configs/ | grep k39 | head -1)
          if [ -n "$FALLBACK" ]; then
            echo "Using fallback: $FALLBACK"
            echo "CONFIG_KSU=y" >> arch/arm/configs/$FALLBACK
            DEFCONFIG=$FALLBACK
          else
            exit 1
          fi
        fi
        
        echo "DEFCONFIG=$DEFCONFIG" >> $GITHUB_ENV
    
    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE
        
        export CROSS_COMPILE=$(pwd)/toolchain/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin/arm-linux-androidkernel-
        export ARCH=arm
        export KCFLAGS=-w
        export CONFIG_SECTION_MISMATCH_WARN_ONLY=y
        
        echo "=== Making defconfig: $DEFCONFIG ==="
        make -C $(pwd) O=$(pwd)/out ARCH=arm $DEFCONFIG
        
        echo "=== Updating config ==="
        make -C $(pwd) O=$(pwd)/out ARCH=arm olddefconfig
        
        echo "=== Starting compilation ==="
        make -C $(pwd) O=$(pwd)/out ARCH=arm -j4 LOCALVERSION="-KernelSU"
    
    - name: Package kernel
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p release
        
        echo "=== Looking for kernel images ==="
        ls -la out/arch/arm/boot/
        
        if [ -f out/arch/arm/boot/Image ]; then
          cp out/arch/arm/boot/Image release/
        fi
        if [ -f out/arch/arm/boot/zImage ]; then
          cp out/arch/arm/boot/zImage release/
        fi
        if [ -f out/arch/arm/boot/zImage-dtb ]; then
          cp out/arch/arm/boot/zImage-dtb release/
        fi
        
        ls -la release/
    
    - name: Upload kernel artifact
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-SM-M022G
        path: release/
        retention-days: 7
