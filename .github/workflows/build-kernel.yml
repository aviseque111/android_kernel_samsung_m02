name: Build KernelSU Kernel for SM-M022G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
    
    - name: Install essential build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git make gcc g++ flex bison bc \
          libssl-dev libelf-dev device-tree-compiler \
          cpio kmod lzop xz-utils curl \
          libncurses-dev lib32ncurses-dev libc6-dev-i386
    
    - name: Download ARM32 cross-compiler
      run: |
        mkdir -p ~/toolchains
        cd ~/toolchains
        curl -L https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-18.1.tar.gz | tar xz
        mv android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9-lineage-18.1 arm-linux-androideabi-4.9
    
    - name: Setup environment
      run: |
        echo "ARCH=arm" >> $GITHUB_ENV
        echo "SUBARCH=arm" >> $GITHUB_ENV
        echo "CROSS_COMPILE=$HOME/toolchains/arm-linux-androideabi-4.9/bin/arm-linux-androideabi-" >> $GITHUB_ENV
    
    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE
        
        export PATH=$HOME/toolchains/arm-linux-androideabi-4.9/bin:$PATH
        
        echo "Building with defconfig: k39tv1_bsp_titan_hamster_defconfig"
        
        make O=out ARCH=arm \
          CROSS_COMPILE=$HOME/toolchains/arm-linux-androideabi-4.9/bin/arm-linux-androideabi- \
          k39tv1_bsp_titan_hamster_defconfig
        
        make O=out ARCH=arm \
          CROSS_COMPILE=$HOME/toolchains/arm-linux-androideabi-4.9/bin/arm-linux-androideabi- \
          -j$(nproc) \
          LOCALVERSION="-KernelSU"
    
    - name: Package kernel
      run: |
        mkdir -p release
        
        if [ -f out/arch/arm/boot/zImage-dtb ]; then
          cp out/arch/arm/boot/zImage-dtb release/
        elif [ -f out/arch/arm/boot/zImage ]; then
          cp out/arch/arm/boot/zImage release/
        fi
        
        echo "SM-M022G KernelSU Kernel" > release/README.txt
        ls -la release/
    
    - name: Upload kernel artifact
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-SM-M022G
        path: release/
        retention-days: 7
