name: Build KernelSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y gcc-arm-linux-gnueabihf flex bison bc libssl-dev libelf-dev
    
    - name: Build kernel
      run: |
        export ARCH=arm
        export CROSS_COMPILE=arm-linux-gnueabihf-
        
        # Copy defconfig directly
        cp arch/arm/configs/a02_defconfig .config
        
        # Add KernelSU and Kprobes
        echo "CONFIG_KSU=y" >> .config
        echo "CONFIG_KPROBES=y" >> .config
        echo "CONFIG_KPROBE_EVENTS=y" >> .config
        
        # Build the actual kernel image (zImage is the default target for ARM)
        make ARCH=arm -j4 zImage LOCALVERSION="-KernelSU"
        
        # Also build device tree if needed
        make ARCH=arm dtbs 2>/dev/null || true
    
    - name: Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: kernel
        path: |
          arch/arm/boot/zImage
          arch/arm/boot/zImage*
          arch/arm/boot/Image
          arch/arm/boot/*.dtb
