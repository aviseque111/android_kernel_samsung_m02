name: Build KernelSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y gcc-arm-linux-gnueabihf flex bison bc libssl-dev libelf-dev
    
    - name: Build kernel
      run: |
        export ARCH=arm
        export CROSS_COMPILE=arm-linux-gnueabihf-
        
        # Copy defconfig
        cp arch/arm/configs/a02_defconfig .config
        
        # Add KernelSU and Kprobes
        echo "CONFIG_KSU=y" >> .config
        echo "CONFIG_KPROBES=y" >> .config
        echo "CONFIG_KPROBE_EVENTS=y" >> .config
        
        # Try different build targets (MediaTek uses Image)
        make ARCH=arm Image LOCALVERSION="-KernelSU" || \
        make ARCH=arm all LOCALVERSION="-KernelSU" || \
        make ARCH=arm
    
    - name: Find and upload kernel
      run: |
        mkdir -p release
        find . -name "Image" -o -name "zImage" -o -name "*.img" 2>/dev/null | head -10
        cp arch/arm/boot/Image release/ 2>/dev/null || true
        cp arch/arm/boot/zImage release/ 2>/dev/null || true
        cp out/arch/arm/boot/Image release/ 2>/dev/null || true
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel
        path: release/
